name: Manual model analysis

on:
  workflow_dispatch:
    inputs:
      input_json:
        description: "Path to a JSON payload committed in the repo or generated by a previous step"
        required: true
        type: string
      dry_run:
        description: "Only evaluate gating; do not call a provider"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run gated model entrypoint
        run: |
          args=(--input "${{ inputs.input_json }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/model_gateway.py "${args[@]}"

      - name: Explain policy
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Manual model analysis

          This workflow is intentionally manual-only and routes through
          `scripts/model_gateway.py`. The gateway rejects empty/no-new inputs
          before any provider implementation can spend tokens.
          EOF
